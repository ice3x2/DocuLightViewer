appId: com.doculight.app
productName: DocuLight
copyright: Copyright (c) 2026

# Disable electron-builder's built-in publish — release is handled by the
# GitHub Actions release job using softprops/action-gh-release.
publish: null

directories:
  buildResources: assets
  output: dist

files:
  - src/**/*
  - assets/**/*
  - package.json

asarUnpack:
  - "src/main/mcp-server.bundle.mjs"

extraResources:
  - from: "assets/icon.png"
    to: "icon.png"

fileAssociations:
  - ext: md
    name: Markdown Document
    description: Markdown Document
    mimeType: text/markdown
    role: Viewer

win:
  target:
    - target: nsis
      arch:
        - x64
        - arm64
    - target: portable
      arch:
        - x64
  icon: assets/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  artifactName: DocuLight-Setup-${version}-${arch}.${ext}

portable:
  artifactName: DocuLight-Portable-${version}.${ext}

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: assets/icon.png
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  artifactName: DocuLight-${version}-${arch}.dmg

linux:
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
  icon: assets/icon.png
  category: Development
  artifactName: DocuLight-${version}-${arch}.${ext}
  mimeTypes:
    - text/markdown
    - text/x-markdown

deb:
  maintainer: ice3x2 <ice3x2@gmail.com>
